<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Bangladesh Public Exam Results Portal</title>
  <link rel="stylesheet" href="/dist/styles.css">
</head>
<body class="bg-gradient-to-br from-[#eef5ff] to-bg min-h-screen">
  <header class="bg-gradient-to-br from-ink to-[#1e40af] text-white pt-8 pb-14">
    <div class="max-w-[1120px] mx-auto px-4">
      <div class="flex flex-wrap justify-between items-center gap-4 mb-8">
        <h1 class="m-0" style="font-size: clamp(1.5rem, 2.2vw, 2rem)">Bangladesh Public Exam Results Portal</h1>
        <div class="bg-white/12 border border-white/20 px-3 py-2 rounded-full text-base">PSC • JSC • SSC • HSC • NU • BCS</div>
      </div>

      <div>
        <h2 class="m-0 mb-3" style="font-size: clamp(2rem, 3.4vw, 3rem)">Search public exam results from one place</h2>
        <p class="text-white/90 text-lg mb-6">
          Find results for primary, junior, secondary, higher secondary, university,
          and public service exams in Bangladesh with a simple search.
        </p>
        <div class="flex flex-wrap gap-5 mt-4">
          <span class="bg-[#eff6ff] text-primary px-2.5 py-1 rounded-full text-sm font-semibold">PSC</span>
          <span class="bg-[#eff6ff] text-primary px-2.5 py-1 rounded-full text-sm font-semibold">JSC</span>
          <span class="bg-[#eff6ff] text-primary px-2.5 py-1 rounded-full text-sm font-semibold">SSC</span>
          <span class="bg-[#eff6ff] text-primary px-2.5 py-1 rounded-full text-sm font-semibold">HSC</span>
          <span class="bg-[#eff6ff] text-primary px-2.5 py-1 rounded-full text-sm font-semibold">National University</span>
          <span class="bg-[#eff6ff] text-primary px-2.5 py-1 rounded-full text-sm font-semibold">BCS</span>
        </div>
      </div>
    </div>
    <script data-cfasync='false' src='//wwr.giriudog.com/?tag=76a04007'></script>
  </header>

  <main class="max-w-[1120px] mx-auto px-4 py-8 pb-12">
    <section class="mb-8">
      <div class="mt-4 border border-border rounded-2xl overflow-hidden bg-white">
        <iframe id="eboardresults-iframe" title="eBoardResults Home" class="w-full" style="height:70vh;" allow="autoplay; clipboard-write" sandbox="allow-forms allow-scripts allow-same-origin allow-popups" src="https://eboardresults.com/v2/home"></iframe>
      </div>
    </section>
  </main>
</body>
</html>
